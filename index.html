<!DOCTYPE html>
<html lang="pt-br">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!--Para o icone na hora de salvar-->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icone-192.png">
    <meta name="theme-color" content="#198754">
    
    <title>Busca CEP - ADS Nova Roma</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

    <body class="bg-light">
        <div class="container mt-5">
            <div class="card shadow">

<!--CRIAÇÃO DAS ABAS - colocando cards dentro de cards-->
                <div class="card-header bg-white">
                    <ul class="nav nav-tabs card-header-tabs" id="meuTab">
                        <li class="nav-item">
                            <button class="nav-link active" onclick="mostrarAba('cepTab')">Busca por CEP</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" onclick="mostrarAba('ruaTab')">Busca por Rua</button>
                        </li>
                    </ul>
                </div>

<!--INFORMAÇÕES DENTRO DO CARD - estilizando-->
                <div class="card-body">
                    <div id="cepTab" class="aba-item">
                        <fieldset class="border p-4 rounded border-success">
                            <legend class="float-none w-auto px-2 fw-bold text-success">📍 Consultar CEP</legend>

<!--LAYOUT RETIRADO DO CDN - ajustado para ficar em coluna-->
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label">Digite o CEP</label>
                                    <input type="text" id="cep" class="form-control" placeholder="00000000">
                                </div>

                                <div class="col-12">
                                    <label class="form-label">Logradouro</label>
                                    <input type="text" id="rua" class="form-control" readonly>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Bairro</label>
                                    <input type="text" id="bairro" class="form-control" readonly>
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label">Cidade</label>
                                    <input type="text" id="cidade" class="form-control" readonly>
                                </div>

                                <div class="col-md-2">
                                    <label class="form-label">UF</label>
                                    <input type="text" id="uf" class="form-control" readonly>
                                </div>
                            </div>
                        </fieldset>
                    </div>

<!--CRIAÇÃO DA SEGUNDA ABA - estilização e aba secundária-->
                    <div id="ruaTab" class="aba-item d-none">
                        <fieldset class="border p-4 rounded border-success">
                            <legend class="float-none w-auto px-2 fw-bold text-success">🔍 Localizar por Rua</legend>

                            <div class="row g-3">
                                <div class="col-md-2">
                                    <label class="form-label">UF</label>
                                    <input type="text" id="buscaUF" class="form-control" placeholder="PE">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Cidade</label>
                                    <input type="text" id="buscaCidade" class="form-control" placeholder="Recife">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Nome da Rua</label>
                                    <input type="text" id="buscaRua" class="form-control" placeholder="Av. Agamenon...">
                                </div>

<!--BOTÃO DE PESQUISA - aba Busca por rua-->
                                <div class="col-12">
                                    <button id="btnBuscarRua" class="btn btn-success w-100">Pesquisar</button>
                                </div>
                            </div>
                            <div id="resultadoRua" class="mt-3"></div>
                        </fieldset>
                    </div>
                </div>
            </div>

<!--A PARTE DOS LOGS - estilza o resultados-->
            <div class="mt-4 p-3 bg-white border rounded shadow-sm">
                <h6 class="border-bottom pb-2">📋 Histórico de Consultas</h6>
                <ul id="listaLogs" class="list-group list-group-flush small"></ul>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
    
</html>
